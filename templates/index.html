<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BizMagnet | Бизнес-империя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Темы */
        body.light {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --tab-bg: #ffffff;
            --tab-active: #3b82f6;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --header-bg: #ffffff;
        }

        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --tab-bg: #1e293b;
            --tab-active: #3b82f6;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --header-bg: #1e293b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.2s, color 0.2s;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: var(--header-bg);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 90;
            backdrop-filter: blur(10px);
        }

        .user-info {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nickname {
            font-weight: 700;
            font-size: 18px;
            background: var(--tab-active);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
        }

        .level-badge {
            background: var(--card);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        /* Карточка баланса */
        .balance-card {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            margin: 20px;
            padding: 24px;
            border-radius: 32px;
            color: white;
            box-shadow: var(--shadow);
        }

        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        .balance-value {
            font-size: 36px;
            font-weight: 800;
            margin-top: 8px;
            word-break: break-word;
        }

        /* Контент */
        .content {
            padding: 0 16px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Карточки бизнесов */
        .business-card {
            background: var(--card);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .business-card:active {
            transform: scale(0.98);
        }

        .business-name {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .business-city {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .business-income {
            color: #10b981;
            font-weight: 700;
            margin-top: 12px;
            font-size: 15px;
        }

        .business-config {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        /* Кнопка кликера */
        .clicker-btn {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border: none;
            border-radius: 100px;
            padding: 40px;
            font-size: 80px;
            cursor: pointer;
            width: 100%;
            transition: 0.07s linear;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .clicker-btn:active {
            transform: scale(0.96);
        }

        /* Кнопки */
        .btn {
            background: var(--tab-active);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: 0.1s;
        }

        .btn:active {
            opacity: 0.8;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card);
            border-radius: 32px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            margin-bottom: 16px;
            font-size: 16px;
        }

        /* Нижние табы */
        .bottom-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tab-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 12px 20px;
            border-top: 1px solid var(--border);
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .tab.active {
            background: var(--tab-active);
            color: white;
        }

        /* Рейтинг */
        .rating-item {
            display: flex;
            justify-content: space-between;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            margin-bottom: 6px;
            border-radius: 16px;
        }

        /* Крипта */
        .crypto-price {
            background: var(--card);
            padding: 20px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            border: 1px solid var(--border);
        }

        /* Загрузчик */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 20px;
            font-weight: 600;
            flex-direction: column;
            gap: 12px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--tab-active);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Круглая кнопка + */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--tab-active);
            color: white;
            font-size: 32px;
            text-align: center;
            line-height: 56px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.3);
            z-index: 100;
            transition: 0.1s;
        }

        .fab:active {
            transform: scale(0.92);
        }

        .warning-text {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body class="light">
    <div id="loading">
        <div class="spinner"></div>
        <div>🔄 Загрузка империи...</div>
    </div>

    <div class="header">
        <div class="user-info">
            <span class="nickname" id="nickname">—</span>
            <span class="level-badge" id="level">Ур. 1</span>
        </div>
    </div>

    <div class="balance-card">
        <div class="balance-label">💰 БАЛАНС</div>
        <div class="balance-value" id="balance">0 ₽</div>
    </div>

    <div id="content" class="content"></div>

    <div class="bottom-tabs">
        <div class="tab active" data-tab="business">📊 Бизнес</div>
        <div class="tab" data-tab="rating">🏆 Топ</div>
        <div class="tab" data-tab="clicker">🖱️ Клик</div>
        <div class="tab" data-tab="crypto">₿ Крипта</div>
        <div class="tab" data-tab="settings">⚙️ Настройки</div>
    </div>

    <div class="fab" id="newBizBtn">+</div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        let userId = tg.initDataUnsafe.user?.id;
        let userData = null;
        let clickCount = 0;
        let clickTimer = null;
        let businesses = [];

        async function apiCall(endpoint, data = null) {
            const options = {
                method: data ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json', 'X-User-Id': userId }
            };
            if (data) options.body = JSON.stringify(data);
            const resp = await fetch(endpoint, options);
            return resp.json();
        }

        async function initUser() {
            let nickname = prompt("🏷️ Введите ваш уникальный никнейм:", "Магнат_" + userId);
            if (!nickname) nickname = "Магнат_" + userId;
            const res = await apiCall('/api/init', { user_id: userId, nickname: nickname });
            if (res.error) {
                alert(res.error);
                return initUser();
            }
            userData = res;
            document.getElementById('nickname').innerText = userData.nickname;
            document.getElementById('level').innerText = `Ур. ${userData.level}`;
            document.getElementById('balance').innerText = formatNumber(userData.balance) + ' ₽';
            if (userData.dark_theme) enableDarkTheme();
            document.getElementById('loading').style.display = 'none';
            loadTab('business');
        }

        function formatNumber(n) { return n.toLocaleString('ru-RU'); }

        async function loadBusinesses() {
            const res = await apiCall(`/api/businesses?user_id=${userId}`);
            businesses = res;
            renderBusinessList();
        }

        function renderBusinessList() {
            if (businesses.length === 0) {
                document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;">🏢 Нет бизнесов.<br>👇 Нажмите + чтобы открыть первый</div>';
                return;
            }
            let html = '';
            businesses.forEach(b => {
                html += `
                    <div class="business-card" onclick="showBusinessModal(${b.id})">
                        <div class="business-name">🏭 ${b.name}</div>
                        <div class="business-city">📍 ${b.city} | ${b.type.replace('_', ' ')}</div>
                        <div class="business-income">💰 +${formatNumber(b.income)} ₽/мин</div>
                        <div class="business-config">⚙️ ${b.config_preview}</div>
                    </div>
                `;
            });
            document.getElementById('content').innerHTML = html;
        }

        async function showBusinessModal(bizId) {
            const biz = businesses.find(b => b.id === bizId);
            if (!biz) return;
            let configHtml = '';
            if (biz.type === 'shop') {
                configHtml = `
                    <select id="supplier" class="input-field">
                        <option value="cheap">Дешёвый</option>
                        <option value="medium" ${biz.config?.supplier === 'medium' ? 'selected' : ''}>Средний</option>
                        <option value="premium">Премиум</option>
                    </select>
                    <input type="number" id="quality" class="input-field" placeholder="Качество (1-10)" value="${biz.config?.product_quality || 5}" min="1" max="10">
                    <input type="number" id="customers" class="input-field" placeholder="Покупатели" value="${biz.config?.customers || 100}">
                `;
            } else if (biz.type === 'taxi') {
                configHtml = `
                    <input type="number" id="cars" class="input-field" placeholder="Авто" value="${biz.config?.cars || 1}" min="1">
                    <select id="car_model" class="input-field">
                        <option value="econom">Эконом</option>
                        <option value="comfort" ${biz.config?.car_model === 'comfort' ? 'selected' : ''}>Комфорт</option>
                        <option value="business">Бизнес</option>
                    </select>
                `;
            } else {
                configHtml = '<p>✨ Настройки появятся в следующем обновлении</p>';
            }
            
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-title">⚙️ ${biz.name}</div>
                ${configHtml}
                <button class="btn" onclick="saveBusinessConfig(${biz.id})">💾 Сохранить</button>
                <button class="btn" onclick="renameBusiness(${biz.id})" style="background:#f97316;">✏️ Переименовать (1M ₽)</button>
                <button class="btn" onclick="closeModal()" style="background:#64748b;">Закрыть</button>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        async function saveBusinessConfig(bizId) {
            const config = {};
            const supplier = document.getElementById('supplier')?.value;
            if (supplier) config.supplier = supplier;
            const quality = document.getElementById('quality')?.value;
            if (quality) config.product_quality = parseInt(quality);
            const customers = document.getElementById('customers')?.value;
            if (customers) config.customers = parseInt(customers);
            const cars = document.getElementById('cars')?.value;
            if (cars) config.cars = parseInt(cars);
            const car_model = document.getElementById('car_model')?.value;
            if (car_model) config.car_model = car_model;
            
            await apiCall('/api/business/update', { user_id: userId, id: bizId, config: config });
            closeModal();
            loadBusinesses();
        }

        async function renameBusiness(bizId) {
            const newName = prompt("✏️ Новое название бизнеса:");
            if (newName) {
                const res = await apiCall('/api/business/rename', { user_id: userId, id: bizId, new_name: newName });
                if (res.error) alert(res.error);
                else { alert("✅ Бизнес переименован!"); loadBusinesses(); }
            }
            closeModal();
        }

        async function createBusiness() {
            const types = await apiCall(`/api/available_businesses?user_id=${userId}`);
            let options = '';
            types.forEach(t => {
                options += `<option value="${t.type}" ${!t.available ? 'disabled' : ''}>${t.name} — ${t.cost.toLocaleString()} ₽ ${!t.available ? '(🔒 ур.'+t.unlock_level+')' : '✅'}</option>`;
            });
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-title">🏢 Открыть бизнес</div>
                <select id="bizType" class="input-field">${options}</select>
                <select id="city" class="input-field">
                    <option>Москва</option><option>СПб</option><option>Новосибирск</option>
                    <option>Екатеринбург</option><option>Казань</option>
                </select>
                <input type="text" id="bizName" class="input-field" placeholder="Название">
                <button class="btn" onclick="confirmCreate()">🏭 Открыть</button>
                <button class="btn" onclick="closeModal()">Отмена</button>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        async function confirmCreate() {
            const bizType = document.getElementById('bizType').value;
            const city = document.getElementById('city').value;
            const name = document.getElementById('bizName').value || `${bizType} в ${city}`;
            const res = await apiCall('/api/business/create', { user_id: userId, type: bizType, city, name });
            if (res.error) alert(res.error);
            else { alert("✅ " + res.message); await refreshBalance(); loadBusinesses(); }
            closeModal();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function startClicker() {
            let html = `<button class="clicker-btn" id="clickBtn">💰</button><div id="clickMessage" class="warning-text"></div>`;
            document.getElementById('content').innerHTML = html;
            let localClicks = 0;
            let localTimer = null;
            document.getElementById('clickBtn').onclick = () => {
                localClicks++;
                if (!localTimer) {
                    localTimer = setTimeout(async () => {
                        const res = await apiCall('/api/click', { user_id: userId, clicks_per_sec: localClicks });
                        if (res.status === 'penalty') {
                            document.getElementById('clickMessage').innerText = res.message;
                            document.getElementById('balance').innerText = formatNumber(res.new_balance) + ' ₽';
                        } else if (res.status === 'warning') {
                            document.getElementById('clickMessage').innerText = res.message;
                        } else {
                            document.getElementById('balance').innerText = formatNumber(res.new_balance) + ' ₽';
                        }
                        localClicks = 0;
                        localTimer = null;
                    }, 1000);
                }
            };
        }

        async function loadRating() {
            const top = await apiCall(`/api/rating/top?user_id=${userId}`);
            let html = '<h3>🏆 Топ-10 магнатов</h3>';
            top.forEach((p, i) => {
                html += `<div class="rating-item"><span>${i+1}. ${p.nickname}</span><span>Ур.${p.level} | ${formatNumber(p.total_earned)} ₽</span></div>`;
            });
            const profile = await apiCall(`/api/rating/profile?user_id=${userId}`);
            html += `<h3 style="margin-top:20px">📊 Мой профиль</h3>
                     <div class="rating-item"><span>💰 Баланс</span><span>${formatNumber(profile.balance)} ₽</span></div>
                     <div class="rating-item"><span>🏆 Заработано</span><span>${formatNumber(profile.total_earned)} ₽</span></div>
                     <div class="rating-item"><span>🏢 Бизнесов</span><span>${profile.businesses_count}</span></div>
                     <div class="rating-item"><span>₿ Крипта</span><span>${profile.crypto_amount.toFixed(4)} монет</span></div>`;
            document.getElementById('content').innerHTML = html;
        }

        async function loadCrypto() {
            const priceData = await apiCall('/api/crypto/price');
            const holdings = await apiCall(`/api/crypto/holdings?user_id=${userId}`).catch(() => ({ amount: 0 }));
            let html = `<div class="crypto-price">₿ 1 монета = ${priceData.price.toFixed(2)} ₽</div>
                        <div style="text-align:center;margin-bottom:16px;">💎 У вас: ${(holdings.amount || 0).toFixed(4)} монет</div>
                        <input type="number" id="cryptoAmount" class="input-field" placeholder="Сумма в ₽">
                        <button class="btn" onclick="buyCrypto()">📈 Купить</button>
                        <button class="btn" style="background:#ef4444" onclick="sellCrypto()">📉 Продать</button>`;
            document.getElementById('content').innerHTML = html;
        }

        async function buyCrypto() {
            const amount = parseInt(document.getElementById('cryptoAmount').value);
            if (amount > 0) {
                const res = await apiCall('/api/crypto/buy', { user_id: userId, amount: amount });
                if (res.error) alert(res.error);
                else { alert(res.message); await refreshBalance(); loadCrypto(); }
            }
        }

        async function sellCrypto() {
            const amount = parseFloat(document.getElementById('cryptoAmount').value);
            if (amount > 0) {
                const res = await apiCall('/api/crypto/sell', { user_id: userId, amount: amount });
                if (res.error) alert(res.error);
                else { alert(res.message); await refreshBalance(); loadCrypto(); }
            }
        }

        function loadSettings() {
            let html = `<h3>⚙️ Настройки</h3>
                        <button class="btn" onclick="toggleTheme()">${userData?.dark_theme ? '🌞 Светлая тема' : '🌙 Тёмная тема'}</button>
                        <button class="btn" style="background:#10b981" onclick="changeNickname()">✏️ Сменить никнейм</button>`;
            document.getElementById('content').innerHTML = html;
        }

        function toggleTheme() {
            const isDark = document.body.classList.contains('dark');
            const newDark = !isDark;
            document.body.classList.toggle('dark', newDark);
            apiCall('/api/settings/theme', { user_id: userId, dark: newDark });
        }

        function enableDarkTheme() {
            document.body.classList.add('dark');
        }

        async function changeNickname() {
            const newName = prompt("🆕 Новый никнейм:");
            if (newName) {
                const res = await apiCall('/api/settings/rename', { user_id: userId, nickname: newName });
                if (res.error) alert(res.error);
                else { alert("✅ Никнейм изменён!"); document.getElementById('nickname').innerText = newName; }
            }
        }

        async function refreshBalance() {
            const res = await apiCall(`/api/rating/profile?user_id=${userId}`);
            if (res) document.getElementById('balance').innerText = formatNumber(res.balance) + ' ₽';
        }

        function loadTab(tab) {
            if (tab === 'business') loadBusinesses();
            else if (tab === 'rating') loadRating();
            else if (tab === 'clicker') startClicker();
            else if (tab === 'crypto') loadCrypto();
            else if (tab === 'settings') loadSettings();
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTab(tab.dataset.tab);
            });
        });

        document.getElementById('newBizBtn').onclick = createBusiness;
        initUser();
    </script>
</body>
</html>
