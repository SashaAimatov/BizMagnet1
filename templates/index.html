<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BizMagnet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body.light { --bg: #f5f7fa; --card: #fff; --text: #1e293b; --text-secondary: #64748b; --border: #e2e8f0; --tab-bg: #fff; --tab-active: #3b82f6; }
        body.dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155; --tab-bg: #1e293b; --tab-active: #3b82f6; }
        body { background: var(--bg); color: var(--text); font-family: system-ui; padding-bottom: 80px; transition: 0.2s; }
        .header { background: var(--card); padding: 16px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
        .nickname { font-weight: 700; background: var(--tab-active); color: white; padding: 6px 14px; border-radius: 30px; }
        .level-badge { background: var(--card); padding: 6px 14px; border-radius: 30px; border: 1px solid var(--border); }
        .balance-card { background: linear-gradient(135deg, #3b82f6, #8b5cf6); margin: 20px; padding: 24px; border-radius: 32px; color: white; }
        .balance-value { font-size: 32px; font-weight: 800; margin-top: 8px; }
        .content { padding: 0 16px; }
        .business-card { background: var(--card); border-radius: 24px; padding: 16px; margin-bottom: 12px; cursor: pointer; border: 1px solid var(--border); }
        .business-name { font-weight: 700; font-size: 18px; }
        .business-income { color: #10b981; font-weight: 700; margin-top: 8px; }
        .clicker-btn { background: linear-gradient(135deg, #f59e0b, #ef4444); border: none; border-radius: 100px; padding: 40px; font-size: 80px; cursor: pointer; width: 100%; }
        .btn { background: var(--tab-active); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; }
        .bottom-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: var(--tab-bg); display: flex; justify-content: space-around; padding: 10px 12px 20px; border-top: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 8px; border-radius: 30px; cursor: pointer; color: var(--text-secondary); }
        .tab.active { background: var(--tab-active); color: white; }
        .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--tab-active); color: white; font-size: 32px; text-align: center; line-height: 56px; cursor: pointer; z-index: 100; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); border-radius: 32px; padding: 24px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .input-field { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 12px; }
        .rating-item { display: flex; justify-content: space-between; padding: 12px; background: var(--card); border-radius: 16px; margin-bottom: 8px; }
        .crypto-price { background: var(--card); padding: 16px; border-radius: 28px; text-align: center; margin-bottom: 16px; font-weight: bold; }
        .skeleton { background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 16px; height: 80px; margin-bottom: 12px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="light">
    <div class="header">
        <span class="nickname" id="nickname">—</span>
        <span class="level-badge" id="level">Ур. 1</span>
    </div>
    <div class="balance-card">
        <div style="font-size:14px;opacity:0.9;">💰 БАЛАНС</div>
        <div class="balance-value" id="balance">加载中...</div>
    </div>
    <div id="content" class="content">
        <!-- Скелетоны для мгновенного отображения -->
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    </div>
    <div class="bottom-tabs">
        <div class="tab active" data-tab="business">📊 Бизнес</div>
        <div class="tab" data-tab="rating">🏆 Топ</div>
        <div class="tab" data-tab="clicker">🖱️ Клик</div>
        <div class="tab" data-tab="crypto">₿ Крипта</div>
        <div class="tab" data-tab="settings">⚙️ Настройки</div>
    </div>
    <div class="fab" id="newBizBtn">+</div>
    <div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        let userId = tg.initDataUnsafe.user?.id;
        let userData = null;
        let businesses = [];

        async function apiCall(endpoint, data = null) {
            const options = { method: data ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const resp = await fetch(endpoint, options);
            return resp.json();
        }

        async function initUser() {
            let nickname = prompt("🏷️ Ваш никнейм:", "Магнат_" + userId);
            if (!nickname) nickname = "Магнат_" + userId;
            const res = await apiCall('/api/init', { user_id: userId, nickname: nickname });
            if (res.error) return initUser();
            userData = res;
            document.getElementById('nickname').innerText = userData.nickname;
            document.getElementById('level').innerText = `Ур. ${userData.level}`;
            document.getElementById('balance').innerHTML = formatNumber(userData.balance) + ' ₽';
            if (userData.dark_theme) document.body.classList.add('dark');
            loadTab('business');
        }

        function formatNumber(n) { return n.toLocaleString('ru-RU'); }

        async function loadBusinesses() {
            const res = await apiCall(`/api/businesses?user_id=${userId}`);
            businesses = res;
            if (businesses.length === 0) {
                document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;">🏢 Нет бизнесов<br>👇 Нажмите +</div>';
                return;
            }
            let html = '';
            businesses.forEach(b => {
                html += `<div class="business-card" onclick="showBusinessModal(${b.id})">
                    <div class="business-name">🏭 ${b.name}</div>
                    <div class="business-city">📍 ${b.city}</div>
                    <div class="business-income">💰 +${formatNumber(b.income)} ₽/мин</div>
                </div>`;
            });
            document.getElementById('content').innerHTML = html;
        }

        async function showBusinessModal(bizId) {
            const biz = businesses.find(b => b.id === bizId);
            let configHtml = '';
            if (biz.type === 'shop') {
                configHtml = `<select id="supplier" class="input-field"><option>medium</option><option>premium</option></select>
                    <input id="quality" class="input-field" placeholder="Качество" value="${biz.config?.product_quality || 5}">`;
            } else {
                configHtml = '<p>Настройки скоро</p>';
            }
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-title">⚙️ ${biz.name}</div>
                ${configHtml}
                <button class="btn" onclick="saveBusinessConfig(${biz.id})">💾 Сохранить</button>
                <button class="btn" onclick="renameBusiness(${biz.id})">✏️ Переименовать (1M)</button>
                <button class="btn" onclick="closeModal()">Закрыть</button>`;
            document.getElementById('modal').style.display = 'flex';
        }

        async function saveBusinessConfig(bizId) {
            const config = {};
            if (document.getElementById('supplier')) config.supplier = document.getElementById('supplier').value;
            if (document.getElementById('quality')) config.product_quality = parseInt(document.getElementById('quality').value);
            await apiCall('/api/business/update', { user_id: userId, id: bizId, config });
            closeModal();
            loadBusinesses();
        }

        async function renameBusiness(bizId) {
            const newName = prompt("Новое название:");
            if (newName) await apiCall('/api/business/rename', { user_id: userId, id: bizId, new_name: newName });
            closeModal();
            loadBusinesses();
        }

        async function createBusiness() {
            const types = await apiCall(`/api/available_businesses?user_id=${userId}`);
            let options = types.map(t => `<option value="${t.type}">${t.name} — ${t.cost.toLocaleString()} ₽</option>`).join('');
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-title">🏢 Новый бизнес</div>
                <select id="bizType" class="input-field">${options}</select>
                <select id="city" class="input-field"><option>Москва</option><option>СПб</option></select>
                <input id="bizName" class="input-field" placeholder="Название">
                <button class="btn" onclick="confirmCreate()">Открыть</button>
                <button class="btn" onclick="closeModal()">Отмена</button>`;
            document.getElementById('modal').style.display = 'flex';
        }

        async function confirmCreate() {
            const res = await apiCall('/api/business/create', {
                user_id: userId,
                type: document.getElementById('bizType').value,
                city: document.getElementById('city').value,
                name: document.getElementById('bizName').value || "Бизнес"
            });
            if (res.error) alert(res.error);
            else { await refreshBalance(); loadBusinesses(); }
            closeModal();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function startClicker() {
            let localClicks = 0, timer = null;
            document.getElementById('content').innerHTML = `<button class="clicker-btn" id="clickBtn">💰</button><div id="clickMsg" style="color:red;text-align:center"></div>`;
            document.getElementById('clickBtn').onclick = () => {
                localClicks++;
                if (!timer) timer = setTimeout(async () => {
                    const res = await apiCall('/api/click', { user_id: userId, clicks_per_sec: localClicks });
                    if (res.new_balance) document.getElementById('balance').innerHTML = formatNumber(res.new_balance) + ' ₽';
                    if (res.message) document.getElementById('clickMsg').innerText = res.message;
                    localClicks = 0;
                    timer = null;
                }, 1000);
            };
        }

        async function loadRating() {
            const top = await apiCall(`/api/rating/top?user_id=${userId}`);
            const profile = await apiCall(`/api/rating/profile?user_id=${userId}`);
            let html = '<h3>🏆 Топ-10</h3>';
            top.forEach((p,i) => html += `<div class="rating-item"><span>${i+1}. ${p.nickname}</span><span>${formatNumber(p.total_earned)} ₽</span></div>`);
            html += `<h3>📊 Мой профиль</h3>
                     <div class="rating-item"><span>💰 Баланс</span><span>${formatNumber(profile.balance)} ₽</span></div>
                     <div class="rating-item"><span>🏢 Бизнесов</span><span>${profile.businesses_count}</span></div>`;
            document.getElementById('content').innerHTML = html;
        }

        async function loadCrypto() {
            const price = await apiCall('/api/crypto/price');
            document.getElementById('content').innerHTML = `
                <div class="crypto-price">₿ ${price.price.toFixed(2)} ₽</div>
                <input id="cryptoAmount" class="input-field" placeholder="Сумма в ₽">
                <button class="btn" onclick="buyCrypto()">📈 Купить</button>
                <button class="btn" style="background:#ef4444" onclick="sellCrypto()">📉 Продать</button>`;
        }

        async function buyCrypto() {
            const amount = parseInt(document.getElementById('cryptoAmount').value);
            if (amount) {
                const res = await apiCall('/api/crypto/buy', { user_id: userId, amount });
                if (!res.error) { await refreshBalance(); loadCrypto(); alert(res.message); }
                else alert(res.error);
            }
        }

        async function sellCrypto() {
            const amount = parseFloat(document.getElementById('cryptoAmount').value);
            if (amount) {
                const res = await apiCall('/api/crypto/sell', { user_id: userId, amount });
                if (!res.error) { await refreshBalance(); loadCrypto(); alert(res.message); }
            }
        }

        function loadSettings() {
            document.getElementById('content').innerHTML = `
                <button class="btn" onclick="toggleTheme()">🌓 Сменить тему</button>
                <button class="btn" onclick="changeNickname()">✏️ Сменить ник</button>`;
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            apiCall('/api/settings/theme', { user_id: userId, dark: isDark });
        }

        async function changeNickname() {
            const newName = prompt("Новый никнейм:");
            if (newName) await apiCall('/api/settings/rename', { user_id: userId, nickname: newName });
            location.reload();
        }

        async function refreshBalance() {
            const profile = await apiCall(`/api/rating/profile?user_id=${userId}`);
            if (profile) document.getElementById('balance').innerHTML = formatNumber(profile.balance) + ' ₽';
        }

        function loadTab(tab) {
            if (tab === 'business') loadBusinesses();
            else if (tab === 'rating') loadRating();
            else if (tab === 'clicker') startClicker();
            else if (tab === 'crypto') loadCrypto();
            else if (tab === 'settings') loadSettings();
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTab(tab.dataset.tab);
            });
        });

        document.getElementById('newBizBtn').onclick = createBusiness;
        initUser();
    </script>
</body>
</html>
